<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>80's Heaven - Weekly Schedule</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

body {
  margin:0;
  font-family:'Press Start 2P', cursive, Arial, sans-serif;
  background: radial-gradient(circle at top left, #ff00cc, #6600ff, #000);
  color:white;
  text-align:center;
  overflow-x:hidden;
}

header {
  padding:10px;
  font-size:18px;
  letter-spacing:1.5px;
  text-shadow:0 0 5px #ff00cc,0 0 10px #ff00cc,0 0 20px #ff00cc;
}

#nowNext {
  font-size:12px;
  margin-bottom:10px;
  color:#ffffff;
}

.tabs {
  display:flex;
  justify-content:center;
  margin:10px 0;
  flex-wrap:wrap;
}

.tab {
  padding:7px 14px;
  margin:2px;
  cursor:pointer;
  border:2px solid #ff00cc;
  border-radius:4px;
  text-shadow:0 0 5px #ff00cc;
  font-size:17.5px;
  transition:all .3s ease;
}

.tab.active {
  background:#ff00cc;
  color:#000;
  box-shadow:0 0 10px #ff00cc;
}

.tab:hover {
  box-shadow:0 0 15px #ff00cc,0 0 30px #ff00cc;
  transform:scale(1.05);
}

.schedule-grid {
  display:grid;
  gap:8px;
  width:98%;
  margin:0 auto 10px auto;
}

.show-card {
  background:rgba(255,255,255,.05);
  border:2px solid #ff00cc;
  border-radius:6px;
  padding:4px;
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:130px;
  text-align:center;
  transition:opacity .5s ease, transform .5s ease;
  opacity:0;
  transform:translateY(10px);
}

.show-card img {
  width:80px;
  height:80px;
  border-radius:50%;
  border:2px solid #ff00cc;
  object-fit:cover;
  margin-bottom:4px;
}

.show-card .time {
  font-size:10px;
  margin-bottom:2px;
}

.show-card .name {
  font-size:10px;
  margin:0;
  word-break:break-word;
}

.show-card.on-air {
  border-color:red;
  box-shadow:0 0 10px red,0 0 20px red;
}

.show-card.on-air::before {
  content:"ON AIR";
  position:absolute;
  top:4px;
  left:4px;
  font-size:16px;
  font-weight:bold;
  animation:flashText 1s infinite;
}

@keyframes flashText {
  0%,100% { color:red; }
  50% { color:white; }
}

.show-card.invisible {
  display:none;
}

@media (min-width:1200px){ .schedule-grid{grid-template-columns:repeat(4,1fr);} }
@media (min-width:900px) and (max-width:1199px){ .schedule-grid{grid-template-columns:repeat(3,1fr);} }
@media (min-width:600px) and (max-width:899px){ .schedule-grid{grid-template-columns:repeat(2,1fr);} }
@media (max-width:599px){ .schedule-grid{grid-template-columns:1fr;} }

</style>
</head>

<body>

<header>80's Heaven – Weekly Schedule</header>
<div id="nowNext">Now Playing: – | Next: –</div>

<div class="tabs">
  <div class="tab" data-day="Saturday">Saturday</div>
  <div class="tab" data-day="Sunday">Sunday</div>
  <div class="tab" data-day="Monday">Monday</div>
  <div class="tab" data-day="Tuesday">Tuesday</div>
  <div class="tab" data-day="Wednesday">Wednesday</div>
  <div class="tab" data-day="Thursday">Thursday</div>
  <div class="tab" data-day="Friday">Friday</div>
</div>

<div id="scheduleGrid" class="schedule-grid"></div>

<script>
// Helpers
function placeholder(name){
  const initials=name.split(" ").map(n=>n[0]).join("").substring(0,2);
  return `https://ui-avatars.com/api/?name=${encodeURIComponent(initials)}&background=ff00cc&color=ffffff&size=128`;
}

function getPresenterImage(name){
  if(name.toUpperCase() === "NON STOP 80'S HEAVEN") return 'images/non-stop-80s-heaven.jpg';
  return `images/${name.toLowerCase().replace(/\s+/g,'-')}.jpg`;
}

function toMinutes(hhmm){
  const [h,m]=hhmm.split(":").map(Number);
  return h*60+m;
}

],

  ["22:00","NON STOP 80'S HEAVEN"]
]
};

const weekdays=["Saturday","Sunday","Monday","Tuesday","Wednesday","Thursday","Friday"];
const grid=document.getElementById("scheduleGrid");
const allCards={};

// Render Cards
weekdays.forEach(day=>{
  allCards[day]=[];
  schedule[day].forEach(show=>{
    const card=document.createElement("div");
    card.className="show-card invisible";

    const time=document.createElement("div");
    time.className="time";
    time.textContent=show[0];

    const img=document.createElement("img");
    img.onerror=()=>img.src=placeholder(show[1]);
    img.src=getPresenterImage(show[1]);

    const name=document.createElement("div");
    name.className="name";
    name.textContent=show[1];

    card.append(time,img,name);
    grid.appendChild(card);
    allCards[day].push(card);
  });
});

// Show Day
function showDay(day){
  weekdays.forEach(d=>{
    allCards[d].forEach(c=>{
      c.classList.add("invisible");
      c.classList.remove("on-air");
    });
  });

  allCards[day].forEach((c,i)=>{
    c.classList.remove("invisible");
    setTimeout(()=>{
      c.style.opacity=1;
      c.style.transform="translateY(0)";
    },i*40);
  });

  updateNowNext(day);
}

// Update Now/Next + ON AIR highlight
function updateNowNext(selectedDay){
  const now=new Date();
  const nowDay=weekdays[now.getDay()];
  const mins=now.getHours()*60+now.getMinutes();
  const shows=schedule[selectedDay];

  let current=null, next=null;

  shows.forEach((s,i)=>{
    const start=toMinutes(s[0]);
    const end=i+1<shows.length?toMinutes(shows[i+1][0]):1440;
    if(selectedDay===nowDay && mins>=start && mins<end){
      current=s;
      next=shows[i+1] || schedule[weekdays[(weekdays.indexOf(nowDay)+1)%7]][0];
    }
  });

  if(current){
    document.getElementById("nowNext").textContent=
      `Now Playing: ${current[1]} | Next: ${next[1]} at ${next[0]}`;
  } else {
    document.getElementById("nowNext").textContent="Now Playing: – | Next: –";
  }

  allCards[selectedDay].forEach(c=>c.classList.remove("on-air"));
  const i=shows.findIndex(s=>s[0]===current?.[0]);
  if(i>=0) allCards[selectedDay][i].classList.add("on-air");
}

// Tabs
document.querySelectorAll(".tab").forEach(tab=>{
  tab.addEventListener("click",()=>{
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");
    showDay(tab.dataset.day);
  });
});

// Auto-select today
const todayName=weekdays[new Date().getDay()];
document.querySelector(`.tab[data-day="${todayName}"]`).classList.add("active");
showDay(todayName);

// Refresh ON AIR every 15s
setInterval(()=>showDay(document.querySelector(".tab.active").dataset.day),15000);

</script>
</body>
</html>
